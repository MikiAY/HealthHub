<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW HealthHub</title>
    <link rel="stylesheet" href="/css/bootstrap-grid.css">
    <link rel="stylesheet" href="/css/bootstrap-grid.min.css">
    <link rel="stylesheet" href="/css/bootstrap-grid.rtl.css">
    <link rel="stylesheet" href="/css/bootstrap-grid.rtl.min.css">
    <link rel="stylesheet" href="/css/bootstrap-reboot.css">
    <link rel="stylesheet" href="/css/bootstrap-reboot.min.css">
    <link rel="stylesheet" href="/css/bootstrap-reboot.rtl.css">
    <link rel="stylesheet" href="/css/bootstrap-reboot.rtl.min.css">
    <link rel="stylesheet" href="/css/bootstrap-utilities.css">
    <link rel="stylesheet" href="/css/bootstrap-utilities.min.css">
    <link rel="stylesheet" href="/css/bootstrap-utilities.rtl.css">
    <link rel="stylesheet" href="/css/bootstrap-utilities.rtl.min.css">
    <link rel="stylesheet" href="/css/bootstrap.css">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/bootstrap.rtl.css">
    <link rel="stylesheet" href="/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="/style.css">

</head>
<body class="bg-light">
<nav class="navbar navbar-light bg-secondary">
  <a class="navbar-brand text-light">BMW HealthHub</a>
</nav>
<div class="container bg-light d-flex align-items-center justify-content-center register-container">
    <div class="card shadow-lg w-100" style="max-width: 480px;">
        <div class="card-body">
            <div class="text-center">
                <h1 class="card-title h3">Fiók létrehozása</h1>
                <p class="card-text text-muted">Töltsd ki a mezőket, hogy regisztrálj</p>
            </div>
            <div class="mt-4">
                <form action="">
                    <div class="mb-4">
                        <label for="lastname" class="form-label text-muted">Keresztnév <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="firstname" placeholder="Keresztnév" required>
                    </div>
                    <div class="mb-4">
                        <label for="lastname" class="form-label text-muted">Vezetéknév <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="lastname" placeholder="Vezetéknév" required>
                    </div>
                    <div class="mb-4">
                        <label for="email" class="form-label text-muted">E-mail cím <span style="color: red;">*</span></label>
                        <input type="email" class="form-control" id="email" placeholder="E-mail cím" required>
                    </div>
                    <div class="mb-4">
                        <label for="phone" class="form-label text-muted">Telefonszám <span style="font-size: small;">(Például: +36-30-015-1234)</span><span style="color: red;">*</span></label>
                        <input type="tel" class="form-control" id="phone" placeholder="Telefonszám" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted">Jelszó <span style="color: red;">*</span></label>
                        <input type="password" class="form-control" id="password" placeholder="Jelszó" required>
                    </div>
                    <div class="mb-2">
                        <label for="password-2" class="form-label text-muted">Jelszó mégegyszer <span style="color: red;">*</span></label>
                        <input type="password" class="form-control" id="password" placeholder="Jelszó mégegyszer" required>
                    </div>
                    <div class="checkbox mb-3">
                        <input type="checkbox">
                        <label for="checkbox" class="form-label text-muted">Elfogadom az ÁSZF-et, stb. <span style="color: red;">*</span></label>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark btn-lg">Regisztráció</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="/js/bootstrap.bundle.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="/js/bootstrap.esm.js"></script>
<script src="/js/bootstrap.esm.min.js"></script>
<script src="/js/bootstrap.js"></script>
<script src="/js/bootstrap.min.js"></script>

</body>
</html>
